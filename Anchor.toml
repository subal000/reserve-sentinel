[toolchain]
anchor_version = "1.1.2"

[features]
resolution = true
skip-lint = false

# Program ID below is a locally-generated keypair (target/deploy/reserve_sentinel-keypair.json).
# For mainnet you'll generate/register a dedicated keypair and run `anchor keys sync`.
[programs.localnet]
reserve_sentinel = "BVkkMMqDuFRgzNtwy9Uc87cJu574YDU6j4us9i7EYMba"

[programs.devnet]
reserve_sentinel = "BVkkMMqDuFRgzNtwy9Uc87cJu574YDU6j4us9i7EYMba"

[programs.mainnet]
reserve_sentinel = "BVkkMMqDuFRgzNtwy9Uc87cJu574YDU6j4us9i7EYMba"

[registry]
url = "https://api.apr.dev"

[provider]
# Default to localnet for tests. Switch to "Mainnet"/"Devnet" for deploys.
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# `anchor test` runs this. Uses ts-mocha against a local validator.
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
